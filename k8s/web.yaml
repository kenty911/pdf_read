apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: pdf-to-mp3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      serviceAccountName: web
      containers:
        - name: web
          image: ghcr.io/kenty911/pdf_read_web:latest  # CI により自動更新
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pdf-to-mp3-secret
                  key: DATABASE_URL
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: pdf-to-mp3-secret
                  key: COOKIE_SECRET
            - name: RECAPTCHA_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: pdf-to-mp3-secret
                  key: RECAPTCHA_SECRET_KEY
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pdf-to-mp3-secret
                  key: SMTP_PASSWORD
            - name: WORKER_IMAGE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: WORKER_IMAGE
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_HOST
              value: "coffee-hajime.sakura.ne.jp"
            - name: SMTP_USER
              value: "info@pdf-to-mp3.ken-ty.com"
            - name: SMTP_FROM
              value: "info@pdf-to-mp3.ken-ty.com"
            - name: DATA_DIR
              value: "/data"
          volumeMounts:
            - name: app-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: app-data
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: pdf-to-mp3
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 3000
