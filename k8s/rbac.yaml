apiVersion: v1
kind: ServiceAccount
metadata:
  name: web
  namespace: pdf-to-mp3
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: web-job-creator
  namespace: pdf-to-mp3
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: web-job-creator
  namespace: pdf-to-mp3
subjects:
  - kind: ServiceAccount
    name: web
    namespace: pdf-to-mp3
roleRef:
  kind: Role
  name: web-job-creator
  apiGroup: rbac.authorization.k8s.io
