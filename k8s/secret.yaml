# 各値は base64 エンコードしてください:
#   echo -n 'your-value' | base64
#
# DATABASE_URL 例:
#   mysql+pymysql://appuser:apppass@mysql:3306/pdftomp3
apiVersion: v1
kind: Secret
metadata:
  name: pdf-to-mp3-secret
  namespace: pdf-to-mp3
type: Opaque
data:
  FLASK_SECRET_KEY: <base64>        # 32文字以上のランダム文字列
  DATABASE_URL: <base64>            # mysql+pymysql://appuser:apppass@mysql:3306/pdftomp3
  RECAPTCHA_SECRET_KEY: <base64>    # Google reCAPTCHA v3 シークレットキー
  MYSQL_ROOT_PASSWORD: <base64>
  MYSQL_PASSWORD: <base64>          # appuser のパスワード
