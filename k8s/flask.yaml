apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask
  namespace: pdf-to-mp3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
        - name: flask
          image: ghcr.io/kenty911/pdf_read:493489c4  # CI により自動更新
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: pdf-to-mp3-config
          env:
            - name: FLASK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: pdf-to-mp3-secret
                  key: FLASK_SECRET_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pdf-to-mp3-secret
                  key: DATABASE_URL
            - name: RECAPTCHA_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: pdf-to-mp3-secret
                  key: RECAPTCHA_SECRET_KEY
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              value: "info@pdf-to-mp3.ken-ty.com"
            - name: SMTP_FROM
              value: "info@pdf-to-mp3.ken-ty.com"
            - name: SMTP_HOST
              value: "coffee-hajime.sakura.ne.jp"
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pdf-to-mp3-secret
                  key: SMTP_PASSWORD
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: pdf-to-mp3-secret
                  key: INTERNAL_SECRET
          volumeMounts:
            - name: app-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 4Gi
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: app-data
---
apiVersion: v1
kind: Service
metadata:
  name: flask
  namespace: pdf-to-mp3
spec:
  selector:
    app: flask
  ports:
    - port: 80
      targetPort: 8000
