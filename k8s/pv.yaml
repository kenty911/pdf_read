apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-app-data
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /data/pdf-to-mp3_app
    type: DirectoryOrCreate
  claimRef:
    namespace: pdf-to-mp3
    name: app-data
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-mysql-data
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /data/pdf-to-mp3_mysql
    type: DirectoryOrCreate
  claimRef:
    namespace: pdf-to-mp3
    name: mysql-data
