<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#2563eb"/>
  <!-- Music note -->
  <g fill="white">
    <!-- note head 1 -->
    <ellipse cx="10" cy="22" rx="3.5" ry="2.5" transform="rotate(-15 10 22)"/>
    <!-- note head 2 -->
    <ellipse cx="22" cy="19" rx="3.5" ry="2.5" transform="rotate(-15 22 19)"/>
    <!-- stem + beam -->
    <rect x="13" y="10" width="2" height="12" rx="1"/>
    <rect x="23.5" y="7" width="2" height="12" rx="1"/>
    <!-- beam connecting the two notes -->
    <rect x="13" y="10" width="12.5" height="2.5" rx="1"/>
  </g>
</svg>
