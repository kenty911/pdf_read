services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      FLASK_SECRET_KEY: dev-secret-key-change-in-production
      DATABASE_URL: mysql+pymysql://appuser:apppass@mysql:3306/pdftomp3
      RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
      VOICEVOX_ONNXRUNTIME_PATH: /app/voicevox/onnxruntime/lib/libvoicevox_onnxruntime.so.1.17.3
      VOICEVOX_DICT_DIR: /app/voicevox/dict/open_jtalk_dic_utf_8-1.11
      VOICEVOX_VVM_PATH: /app/voicevox/models/vvms/0.vvm
      DATA_DIR: /data
    volumes:
      - app-data:/data
      - /home/kento/pdf_to_wav/example/python:/app/voicevox:ro
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: pdftomp3
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uappuser", "-papppass"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  app-data:
  mysql-data:
