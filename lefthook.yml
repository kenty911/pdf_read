pre-commit:
  parallel: true
  commands:
    ruff-format:
      glob: "app/**/*.py"
      run: uv run ruff format app/
      stage_fixed: true
    ruff-lint:
      glob: "app/**/*.py"
      run: uv run ruff check --fix app/
      stage_fixed: true
    ty:
      glob: "app/**/*.py"
      run: uv run ty check app/
    biome:
      glob: "frontend/src/**/*.{ts,tsx}"
      root: frontend
      run: npx biome check --write src/
      stage_fixed: true
    tsc:
      glob: "frontend/**/*.{ts,tsx}"
      root: frontend
      run: npx tsc --noEmit
