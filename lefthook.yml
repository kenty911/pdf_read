pre-commit:
  parallel: true
  commands:
    biome:
      glob: "service/{app,server,actions}/**/*.{ts,tsx}"
      root: service
      run: npx biome check --write app/ server/ actions/
      stage_fixed: true
    tsc:
      glob: "service/**/*.{ts,tsx}"
      root: service
      run: npx tsc --noEmit
    ruff-format:
      glob: "worker/**/*.py"
      root: worker
      run: uv run ruff format .
      stage_fixed: true
    ruff-lint:
      glob: "worker/**/*.py"
      root: worker
      run: uv run ruff check --fix .
      stage_fixed: true
