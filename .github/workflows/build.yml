name: Build and Push

on:
  push:
    branches: [main]
    paths-ignore:
      - "k8s/**"   # マニフェスト更新コミットで再トリガーしない

permissions:
  contents: write  # k8s/flask.yaml のコミット push に必要
  packages: write  # GHCR への push に必要

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dev dependencies
        run: uv sync --frozen --group dev

      - name: ruff lint
        run: uv run ruff check app/

      - name: ruff format check
        run: uv run ruff format --check app/

      - name: ty type check
        run: uv run ty check app/

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: biome check
        run: npx biome ci src/
        working-directory: frontend

      - name: tsc type check
        run: npx tsc --noEmit
        working-directory: frontend

  build-and-push:
    needs: [lint-python, lint-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ env.SHORT_SHA }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: BUILDKIT_INLINE_CACHE=1
        env:
          BUILDKIT_PROGRESS: plain

      - name: Update image tag in k8s manifest
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:${{ env.SHORT_SHA }}"
          sed -i "s|image: ghcr.io/.*|image: ${IMAGE}  # CI により自動更新|" k8s/flask.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/flask.yaml

          # 変更がある場合のみコミット
          git diff --staged --quiet || \
            git commit -m "ci: update flask image to ${SHORT_SHA} [skip ci]"

          git push
