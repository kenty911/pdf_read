name: Build and Push

on:
  push:
    branches: [main]
    paths-ignore:
      - "k8s/**"   # マニフェスト更新コミットで再トリガーしない

permissions:
  contents: write  # k8s/flask.yaml のコミット push に必要
  packages: write  # GHCR への push に必要

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ env.SHORT_SHA }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in k8s manifest
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:${{ env.SHORT_SHA }}"
          sed -i "s|image: ghcr.io/.*|image: ${IMAGE}  # CI により自動更新|" k8s/flask.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/flask.yaml

          # 変更がある場合のみコミット
          git diff --staged --quiet || \
            git commit -m "ci: update flask image to ${SHORT_SHA} [skip ci]"

          git push
